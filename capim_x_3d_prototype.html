<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Capim-x 3D — Rocket to the Moon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#03030a; font-family:monospace; }
  canvas { display:block; }

  #flash {
    position:fixed; inset:0; background:#ff3344; opacity:0; pointer-events:none;
    transition:opacity 90ms ease-out; z-index:5;
  }

  #hud { position:fixed; inset:0; pointer-events:none; z-index:4; color:#fff; }
  #shipLabel   { position:absolute; left:14px; bottom:10px; font-size:11px; color:#5577aa; }
  #scoreText   { position:absolute; right:14px; top:14px; font-size:16px; }
  #livesText   { position:absolute; left:14px; top:40px; font-size:16px; }
  #controlsText{ position:absolute; left:50%; bottom:6px; transform:translateX(-50%); font-size:10px; color:#889; white-space:nowrap; }
  #fuelBarBg   { position:absolute; left:14px; top:14px; width:140px; height:14px; background:#222233; border:1px solid rgba(255,255,255,0.6); }
  #fuelBarFill { position:absolute; left:0; top:0; height:100%; width:100%; background:#33cc66; }
  #progressBarBg  { position:absolute; left:14px; right:14px; top:6px; height:4px; background:#222233; }
  #progressBarFill{ position:absolute; left:0; top:0; height:100%; width:0%; background:#88bbff; }
  .stage-tick { position:absolute; top:-2px; width:2px; height:8px; background:#9fd6c8; }
  #stageMsg {
    position:absolute; left:50%; top:22%; transform:translateX(-50%);
    font-size:15px; color:#9fd6c8; letter-spacing:3px; white-space:nowrap;
    text-shadow:0 0 10px rgba(80,255,200,0.5); opacity:0; transition:opacity 0.45s;
    will-change:opacity; /* promove a camada já no load — evita hitch de compositor na 1ª separação */
  }

  .overlay { position:fixed; inset:0; z-index:10; pointer-events:none; }
  .overlay.center-panel { display:flex; align-items:center; justify-content:center; }
  .panel {
    background:rgba(5,5,20,0.6); padding:26px 34px; border-radius:8px;
    white-space:pre-line; text-align:center; line-height:1.55; font-size:13px;
  }
  #gameOverOverlay .panel { color:#ff5555; }
  #winOverlay .panel      { color:#88ffcc; }

  #introOverlay { overflow:hidden; }
  /* fundo espacial PERSISTENTE (mesmo na intro e no menu): nebulosa + estrelas + lua + Terra.
     z-index 1 = acima do canvas 3D, abaixo dos overlays (10) e do HUD (4). */
  .space-scene {
    position:fixed; inset:0; z-index:1; overflow:hidden; pointer-events:none;
    background:
      radial-gradient(ellipse at 72% 22%, rgba(70,100,180,0.20), transparent 55%),
      radial-gradient(ellipse at 18% 82%, rgba(130,60,150,0.16), transparent 52%),
      radial-gradient(ellipse at 50% 50%, #060814 0%, #02030a 70%, #010109 100%);
  }
  .star {
    position:absolute; border-radius:50%; background:#fff;
    animation:twinkle var(--dur,3s) ease-in-out var(--delay,0s) infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.15; transform:scale(0.7); }
    50%     { opacity:1;    transform:scale(1.1); }
  }
  .moon {
    position:absolute; top:7%; right:8%;
    width:86px; height:86px; border-radius:50%;
    background:radial-gradient(circle at 38% 34%, #fdfdf5 0%, #d9dce6 42%, #9aa0b4 78%, #6d7286 100%);
    box-shadow:
      0 0 34px 6px rgba(200,215,255,0.30),
      inset -10px -7px 18px rgba(0,0,0,0.35);
  }
  /* crateras sutis */
  .moon::before, .moon::after {
    content:''; position:absolute; border-radius:50%;
    background:rgba(90,95,115,0.35); box-shadow:inset 1px 1px 3px rgba(0,0,0,0.3);
  }
  .moon::before { width:15px; height:15px; top:30%; left:26%; }
  .moon::after  { width:9px; height:9px; top:58%; left:56%;
    box-shadow:inset 1px 1px 3px rgba(0,0,0,0.3), -20px -8px 0 -2px rgba(90,95,115,0.3); }
  /* a Terra, pequena e azul, no canto inferior esquerdo */
  .earth {
    position:absolute; bottom:9%; left:7%;
    width:58px; height:58px; border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, rgba(255,255,255,0.35) 0%, transparent 22%),
      radial-gradient(circle at 62% 66%, #2f7d3a 0%, transparent 30%),
      radial-gradient(circle at 30% 62%, #2f7d3a 0%, transparent 26%),
      radial-gradient(circle at 50% 45%, #2f6fd6 0%, #1a4fa0 70%, #0d2f6b 100%);
    box-shadow:
      0 0 26px 5px rgba(80,140,255,0.35),
      inset -8px -6px 16px rgba(0,0,0,0.45);
  }
  .crawl-viewport {
    position:absolute; inset:0; overflow:hidden; z-index:2;
  }
  /* leve fade no topo e na base para o texto aparecer/sumir suave */
  .crawl-viewport::after {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:3;
    background:linear-gradient(to bottom,
      rgba(2,3,10,0.55) 0%, transparent 24%, transparent 78%, rgba(2,3,10,0.92) 100%);
  }
  .crawl-text {
    position:absolute; top:100%; left:50%;
    width:680px; max-width:82%;
    transform:translateX(-50%);
    color:#ffe81f; font-weight:600; text-align:center; white-space:pre-line;
    font-family:'Exo 2', sans-serif; text-transform:uppercase;
    font-size:24px; line-height:1.9; letter-spacing:0.5px;
    text-shadow:0 0 14px rgba(255,232,31,0.35);
    animation:crawl 40s linear forwards;
    animation-play-state:paused;   /* só corre após o 1º gesto (permite áudio) */
  }
  @keyframes crawl {
    0%   { top:100%; }
    100% { top:-180%; }
  }
  /* título CAPIM-X no crawl — grande e imponente */
  .crawl-title {
    display:inline-block;
    font-family:'Orbitron', sans-serif; font-weight:900;
    font-size:64px; letter-spacing:10px; line-height:1.1;
    color:#fff; text-shadow:0 0 26px rgba(136,187,255,0.55), 0 0 8px rgba(255,255,255,0.4);
  }
  /* palavras finais — discretas, sem exagero de brilho */
  .crawl-final {
    display:inline-block; margin-top:10px;
    font-family:'Orbitron', sans-serif; font-weight:700;
    font-size:26px; letter-spacing:3px; line-height:1.5; text-transform:uppercase;
    color:#ffe81f; text-shadow:0 0 8px rgba(255,232,31,0.4);
  }
  .skip-hint {
    position:absolute; left:0; right:0; bottom:18px; text-align:center;
    color:#889; font-size:11px; letter-spacing:0.5px;
  }
  .intro-start {
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:4;
    text-align:center; white-space:nowrap;
    font-family:'Orbitron', sans-serif; font-weight:500;
    color:#cfe3ff; font-size:15px; letter-spacing:3px;
    text-shadow:0 0 16px rgba(136,187,255,0.6);
    animation:blink 1.6s steps(1) infinite;
  }
  .title-logo {
    font-family:'Orbitron', sans-serif; font-weight:900;
    font-size:52px; letter-spacing:8px; color:#fff; margin-bottom:14px;
    text-shadow:0 0 24px rgba(136,187,255,0.6), 0 0 6px rgba(255,255,255,0.5);
  }
  .title-tagline {
    font-family:'Orbitron', sans-serif; font-weight:500;
    font-size:14px; color:#9fd6c8; margin-bottom:30px; letter-spacing:4px; text-transform:uppercase;
  }
  @keyframes blink { 50% { opacity:0.25; } }

  /* ---------- menu temático (título + seleção) ---------- */
  .menu {
    pointer-events:auto;
    display:flex; flex-direction:column; align-items:center;
    padding:34px 40px 28px; min-width:340px;
    background:linear-gradient(160deg, rgba(16,22,44,0.72), rgba(6,9,22,0.82));
    border:1px solid rgba(120,170,255,0.28); border-radius:16px;
    box-shadow:0 0 60px rgba(60,110,220,0.18), inset 0 0 40px rgba(30,60,140,0.12);
    backdrop-filter:blur(3px);
  }
  .select-title {
    font-family:'Orbitron', sans-serif; font-weight:700;
    font-size:15px; color:#cfe3ff; margin-bottom:20px; letter-spacing:3px; text-transform:uppercase;
  }
  .menu-hint {
    margin-top:16px; font-size:11px; color:#7f93b8; letter-spacing:2px; text-transform:uppercase;
    animation:blink 1.8s steps(1) infinite;
  }

  /* base dos botões */
  .btn {
    pointer-events:auto; cursor:pointer; user-select:none;
    font-family:'Orbitron', sans-serif; font-weight:700;
    color:#eaf2ff; background:linear-gradient(160deg, rgba(40,60,120,0.55), rgba(20,30,70,0.55));
    border:1px solid rgba(130,180,255,0.35); border-radius:10px;
    letter-spacing:2px; text-transform:uppercase;
    transition:transform .12s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
    outline:none;
  }
  .btn:hover {
    transform:translateY(-2px);
    border-color:rgba(150,200,255,0.8);
    box-shadow:0 0 26px rgba(90,150,255,0.45);
    background:linear-gradient(160deg, rgba(55,80,160,0.7), rgba(28,42,95,0.7));
  }
  .btn:active { transform:translateY(0) scale(0.98); }

  /* botão principal NOVO JOGO */
  .btn-primary {
    display:flex; align-items:center; gap:12px;
    margin-top:8px; padding:16px 34px; font-size:19px;
    background:linear-gradient(160deg, rgba(60,120,255,0.30), rgba(20,40,110,0.45));
    border-color:rgba(150,200,255,0.55);
    box-shadow:0 0 30px rgba(80,140,255,0.30);
  }
  .btn-primary:hover { box-shadow:0 0 40px rgba(110,170,255,0.65); }
  .btn-icon { font-size:22px; filter:drop-shadow(0 0 6px rgba(160,200,255,0.8)); }

  /* botões de dificuldade */
  .diff-btn {
    display:flex; align-items:center; gap:16px; text-align:left;
    width:340px; margin:7px 0; padding:14px 18px;
    border-left-width:4px;
  }
  .diff-key {
    flex:0 0 auto; width:34px; height:34px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:900;
    background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.25);
  }
  .diff-body { display:flex; flex-direction:column; gap:3px; }
  .diff-name { font-size:17px; letter-spacing:2px; }
  .diff-desc {
    font-family:'Exo 2', sans-serif; font-weight:400; text-transform:none;
    font-size:11px; letter-spacing:0.3px; color:#a9bede;
  }
  /* cores por nível */
  .diff-facil   { border-left-color:#33cc66; }
  .diff-facil   .diff-key { color:#8dffb4; border-color:rgba(51,204,102,0.6); }
  .diff-facil:hover   { box-shadow:0 0 26px rgba(51,204,102,0.4); border-color:rgba(51,204,102,0.8); }
  .diff-medio   { border-left-color:#ffcc33; }
  .diff-medio   .diff-key { color:#ffe08a; border-color:rgba(255,204,51,0.6); }
  .diff-medio:hover   { box-shadow:0 0 26px rgba(255,204,51,0.4); border-color:rgba(255,204,51,0.8); }
  .diff-dificil { border-left-color:#ff5555; }
  .diff-dificil .diff-key { color:#ff9a9a; border-color:rgba(255,85,85,0.6); }
  .diff-dificil:hover { box-shadow:0 0 26px rgba(255,85,85,0.4); border-color:rgba(255,85,85,0.8); }

  /* voltar */
  .btn-back {
    margin-top:14px; padding:9px 20px; font-size:12px; font-weight:500;
    color:#9fb2d6; background:transparent; border-color:rgba(120,150,200,0.3);
  }
</style>
</head>
<body>
<div id="flash"></div>
<div class="space-scene" id="spaceScene"><div class="earth"></div><div class="moon"></div></div>
<div id="hud">
  <div id="fuelBarBg"><div id="fuelBarFill"></div></div>
  <div id="progressBarBg"><div id="progressBarFill"></div></div>
  <div id="scoreText"></div>
  <div id="livesText"></div>
  <div id="shipLabel">CAPIM-X</div>
  <div id="stageMsg"></div>
  <div id="controlsText">← → desliza   ↑ acelera   ↓ reduz empuxo   SPACE atira   M muta</div>
</div>
<div id="introOverlay" class="overlay" style="display:block">
  <div class="crawl-viewport"><div class="crawl-text" id="crawlText"></div></div>
  <div class="intro-start" id="introStart">▶ CLIQUE OU PRESSIONE QUALQUER TECLA PARA INICIAR</div>
  <div class="skip-hint" id="skipHint" style="display:none">pressione qualquer tecla ou clique para pular</div>
</div>
<div id="titleOverlay" class="overlay center-panel" style="display:none">
  <div class="menu">
    <div class="title-logo">CAPIM-X</div>
    <div class="title-tagline">ROCKET TO THE MOON</div>
    <button class="btn btn-primary" id="btnNewGame">
      <span class="btn-icon">🚀</span><span>NOVO JOGO</span>
    </button>
    <div class="menu-hint">ENTER ou clique</div>
  </div>
</div>
<div id="selectOverlay" class="overlay center-panel" style="display:none">
  <div class="menu">
    <div class="select-title">ESCOLHA A DIFICULDADE</div>
    <button class="btn diff-btn diff-facil" data-diff="facil">
      <span class="diff-key">1</span>
      <span class="diff-body"><span class="diff-name">FÁCIL</span><span class="diff-desc">Corredor largo · sem gravidade lateral</span></span>
    </button>
    <button class="btn diff-btn diff-medio" data-diff="medio">
      <span class="diff-key">2</span>
      <span class="diff-body"><span class="diff-name">MÉDIO</span><span class="diff-desc">Gravidade lateral moderada</span></span>
    </button>
    <button class="btn diff-btn diff-dificil" data-diff="dificil">
      <span class="diff-key">3</span>
      <span class="diff-body"><span class="diff-name">DIFÍCIL</span><span class="diff-desc">Corredor estreito · gravidade forte</span></span>
    </button>
    <button class="btn btn-back" id="btnBack">‹ VOLTAR</button>
    <div class="menu-hint">1 / 2 / 3 ou clique</div>
  </div>
</div>
<div id="gameOverOverlay" class="overlay center-panel" style="display:none"><div class="panel" id="gameOverPanel"></div></div>
<div id="winOverlay" class="overlay center-panel" style="display:none"><div class="panel" id="winPanel"></div></div>
<script>
/* =======================================================
   CAPIM-X 3D — ROCKET TO THE MOON
   Porte do jogo 2D (Phaser, rocket_to_the_moon.html) para
   um rail-shooter em terceira pessoa com Three.js. Reaproveita
   integralmente o sistema de áudio procedural (Web Audio, é
   independente de engine) e a narrativa/estrutura de estados
   do original; a nuvem de asteroides substitui as paredes
   sólidas do 2D — encostar nela também tira vida, mas sem ser
   uma parede rígida (mais fiel à sensação de "cinturão").
   Sem build, sem assets externos — Three.js via CDN clássico.
   ======================================================= */

function damp(a, b, lambda, dt) { return a + (b - a) * (1 - Math.exp(-lambda * dt)); }
function dist2(a, b) { const dx=a.x-b.x, dy=a.y-b.y, dz=a.z-b.z; return dx*dx+dy*dy+dz*dz; }
function sq(v) { return v*v; }

// ---------- dificuldades (retunadas para a escala do mundo 3D) ----------
const DIFFICULTIES = {
  facil:   { label:'FÁCIL',   moonDistance:900,  corridorHalf:4.2, minHalf:3.4, maxHalf:5.0, fuelDrainMul:0.7, spawnMul:0.7, thrust:15, drag:11, maxSpeed:6.5, gravity:0   },
  medio:   { label:'MÉDIO',   moonDistance:1500, corridorHalf:3.6, minHalf:2.6, maxHalf:5.2, fuelDrainMul:1.0, spawnMul:1.0, thrust:16, drag:9,  maxSpeed:7,   gravity:0.9 },
  dificil: { label:'DIFÍCIL', moonDistance:2200, corridorHalf:3.0, minHalf:2.0, maxHalf:4.2, fuelDrainMul:1.3, spawnMul:1.4, thrust:15, drag:6,  maxSpeed:7.5, gravity:1.8 }
};

const SHIP_BASE = {
  radius: 0.5,
  baseScroll: 9,
  maxScroll: 17,
  boostMul: 1.5,
  brakeMul: 0.55,
  scrollLerp: 3.2,
  bulletSpeed: 34,
  shootCooldown: 220,
  shotFuelCost: 0.8,
};

const CORRIDOR = {
  segmentLength: 10,      // 1 "linha" — equivalente aos 32px do original
  beltWidth: 3.2,         // banda estreita e densa — lê como barreira, não como poeira espalhada pelo mapa
  beltOverlap: 0.35,      // só uma borda irregular (aspecto orgânico), sem invadir muito o corredor
  rocksPerSide: 9,
  rockMinR: 0.55,
  rockMaxR: 1.15,
  driftStep: 1.1,
  maxCenterOffset: 7,
  aheadDistance: 150,
  behindMargin: 20,
  hardLimitMargin: 6,     // clamp de segurança bem além da nuvem, invisível
};

/* =======================================================
   ÁUDIO — 100% procedural (Web Audio API), copiado do jogo 2D
   sem alterações: é puro Web Audio, não depende de Phaser
   nem de Three.js.
   ======================================================= */
const CH = {
  Am:[57,60,64], C:[60,64,67], F:[53,57,60], G:[55,59,62], Dm:[50,53,57], E:[52,56,59]
};

const AudioSys = {
  ctx:null, master:null, musicGain:null, sfxGain:null, introGain:null,
  timer:null, track:null, step:0, nextTime:0, muted:false,
  introTimer:null, introPlayed:false,

  init() {
    if (this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
    this.master    = this.ctx.createGain(); this.master.gain.value    = 0.5;  this.master.connect(this.ctx.destination);
    this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = 0.35; this.musicGain.connect(this.master);
    this.sfxGain   = this.ctx.createGain(); this.sfxGain.gain.value   = 0.55; this.sfxGain.connect(this.master);
    this.introGain = this.ctx.createGain(); this.introGain.gain.value = 1.0;  this.introGain.connect(this.musicGain);
  },

  mtof(m) { return 440 * Math.pow(2, (m-69)/12); },

  blip(time, freq, dur, type, dest, peak=0.3, glideTo=null) {
    if (!this.ctx) return;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, time);
    if (glideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, glideTo), time+dur);
    g.gain.setValueAtTime(0.0001, time);
    g.gain.exponentialRampToValueAtTime(peak, time+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, time+dur);
    o.connect(g); g.connect(dest);
    o.start(time); o.stop(time+dur+0.03);
  },

  noise(time, dur, peak, filterFreq) {
    if (!this.ctx) return;
    // buffer de ruído gerado uma única vez e reaproveitado: preencher um
    // novo a cada disparo causava micro-engasgos no frame do efeito
    if (!this.noiseBuf) {
      const n = this.ctx.sampleRate; // 1s de ruído, o suficiente para qualquer SFX
      this.noiseBuf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
      const data = this.noiseBuf.getChannelData(0);
      for (let i=0;i<n;i++) data[i] = Math.random()*2-1;
    }
    const src = this.ctx.createBufferSource(); src.buffer = this.noiseBuf;
    const filt = this.ctx.createBiquadFilter(); filt.type='lowpass';
    filt.frequency.setValueAtTime(filterFreq, time);
    filt.frequency.exponentialRampToValueAtTime(Math.max(80, filterFreq*0.2), time+dur);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(peak, time);
    g.gain.exponentialRampToValueAtTime(0.0001, time+dur);
    src.connect(filt); filt.connect(g); g.connect(this.sfxGain);
    src.start(time); src.stop(time+dur);
  },

  menuTrack: {
    stepDur:0.30, length:16,
    play(step, time) {
      const bars = [CH.Am, CH.F, CH.C, CH.G];
      const chord = bars[Math.floor(step/4)%4];
      this.blip(time, this.mtof(chord[step%3]+12), 0.55, 'triangle', this.musicGain, 0.16);
      if (step%4===0) this.blip(time, this.mtof(chord[0]-12), 1.3, 'sine', this.musicGain, 0.20);
      if (step%8===2) this.blip(time, this.mtof(chord[2]+24), 0.45, 'sine', this.musicGain, 0.07);
    }
  },
  gameTrack: {
    stepDur:0.13, length:32,
    play(step, time) {
      const bars = [CH.Am, CH.C, CH.F, CH.G, CH.Am, CH.F, CH.Dm, CH.E];
      const chord = bars[Math.floor(step/4)%8];
      this.blip(time, this.mtof(chord[0]-12), 0.12, 'square', this.musicGain, 0.14);
      if (step%2===0) this.blip(time, 70, 0.10, 'sine', this.musicGain, 0.30, 40);
      const seq = [0,1,2,1];
      this.blip(time, this.mtof(chord[seq[step%4]]+12), 0.11, 'sawtooth', this.musicGain, 0.10);
    }
  },

  playIntro() {
    if (!this.ctx) return;
    this.stopMusic();
    this.introGain.gain.cancelScheduledValues(this.ctx.currentTime);
    this.introGain.gain.setValueAtTime(1.0, this.ctx.currentTime);
    const t = this.ctx.currentTime + 0.15;
    const dest = this.introGain;
    this.blip(t, this.mtof(33), 8.4, 'sine',     dest, 0.18);
    this.blip(t, this.mtof(45), 8.4, 'triangle', dest, 0.09);
    const pad = (off, chord, dur) => chord.forEach(m => this.blip(t+off, this.mtof(m), dur, 'sine', dest, 0.055));
    pad(0.0, CH.Am, 2.4); pad(2.4, CH.F, 2.4); pad(4.8, CH.G, 1.6); pad(6.4, CH.Am, 2.0);
    const mel = [[0.0,64,0.8],[0.8,69,0.8],[1.6,72,1.2],[2.8,71,0.6],
                 [3.4,69,1.4],[4.8,67,0.8],[5.6,64,0.8],[6.4,69,1.9]];
    mel.forEach(([off,m,dur]) => this.blip(t+off, this.mtof(m), dur, 'triangle', dest, 0.20));
    this.introTimer = setTimeout(() => this.startTrack(this.menuTrack), 8600);
  },

  startTrack(track) {
    if (!this.ctx) return;
    this.stopMusic();
    this.track = track; this.step = 0; this.nextTime = this.ctx.currentTime + 0.1;
    this._schedule();
  },
  _schedule() {
    if (!this.track) return;
    while (this.nextTime < this.ctx.currentTime + 0.2) {
      this.track.play.call(this, this.step, this.nextTime);
      this.nextTime += this.track.stepDur;
      this.step = (this.step+1) % this.track.length;
    }
    this.timer = setTimeout(() => this._schedule(), 40);
  },
  stopMusic() {
    if (this.timer)      { clearTimeout(this.timer); this.timer = null; }
    if (this.introTimer) { clearTimeout(this.introTimer); this.introTimer = null; }
    if (this.introGain && this.ctx) {
      this.introGain.gain.cancelScheduledValues(this.ctx.currentTime);
      this.introGain.gain.setValueAtTime(0, this.ctx.currentTime);
    }
    this.track = null;
  },

  toggleMute() { this.muted = !this.muted; if (this.master) this.master.gain.value = this.muted ? 0 : 0.5; },

  shoot()   { if (!this.ctx) return; this.blip(this.ctx.currentTime, 900, 0.12, 'square', this.sfxGain, 0.22, 180); },
  explosion(){ this.noise(this.ctx ? this.ctx.currentTime : 0, 0.35, 0.4, 900);
               if (this.ctx) this.blip(this.ctx.currentTime, 120, 0.3, 'sawtooth', this.sfxGain, 0.18, 40); },
  pickup()  { if (!this.ctx) return; const t=this.ctx.currentTime;
              this.blip(t, this.mtof(72), 0.10, 'triangle', this.sfxGain, 0.22);
              this.blip(t+0.09, this.mtof(79), 0.14, 'triangle', this.sfxGain, 0.22); },
  separation(){ if (!this.ctx) return; const t=this.ctx.currentTime;
              this.noise(t, 0.22, 0.25, 500);                                  // clank pneumático dos parafusos explosivos
              this.blip(t+0.05, 220, 0.32, 'square', this.sfxGain, 0.12, 90); },
  gameOver(){ if (!this.ctx) return; this.stopMusic(); const t=this.ctx.currentTime;
              [57,53,50,45].forEach((m,i)=> this.blip(t+i*0.22, this.mtof(m), 0.42, 'sawtooth', this.sfxGain, 0.24));
              this.blip(t+0.9, this.mtof(33), 1.3, 'sine', this.sfxGain, 0.30); },
  win()     { if (!this.ctx) return; this.stopMusic(); const t=this.ctx.currentTime;
              [60,64,67,72,76].forEach((m,i)=> this.blip(t+i*0.13, this.mtof(m), 0.34, 'square', this.sfxGain, 0.22));
              [60,64,67,72].forEach(m => this.blip(t+0.66, this.mtof(m), 1.5, 'triangle', this.sfxGain, 0.16)); }
};

/* =======================================================
   RÁDIO NASA — trechos aleatórios de um MP3 real, tocando
   POR CIMA da trilha procedural (não substitui nada). É um
   HTMLAudioElement independente do Web Audio: começa num
   ponto aleatório do arquivo, toca alguns segundos e para.
   ======================================================= */
const RadioChatter = {
  el: null, stopTimer: null, ready: false,
  init() {
    if (this.el) return;
    this.el = new Audio(encodeURI('Apollo 11 Radio Chatter - All Things 3D (youtube).mp3'));
    this.el.preload = 'auto';
    this.el.volume = 0.4;
    this.el.addEventListener('loadedmetadata', () => { this.ready = true; });
  },
  playClip() {
    if (!this.el || !this.ready || AudioSys.muted) return;
    const dur = this.el.duration;
    if (!dur || !isFinite(dur)) return;
    const clipLen = 4 + Math.random()*4;
    this.el.currentTime = Math.random() * Math.max(0, dur - clipLen);
    this.el.play().catch(() => {});
    clearTimeout(this.stopTimer);
    this.stopTimer = setTimeout(() => { if (this.el) this.el.pause(); }, clipLen*1000);
  },
  stop() {
    clearTimeout(this.stopTimer);
    if (this.el) this.el.pause();
  }
};

// ---------- nave (foguete multi-estágio) ----------
// A Capim-X agora é um foguete de verdade: módulo de comando na ponta,
// 2º estágio, 1º estágio com aletas e dois boosters laterais. Conforme
// avança rumo à Lua, cada estágio esgotado se separa e vira destroço
// tombando para trás — e a nave, mais leve, responde melhor.
const ship = new THREE.Group();
ship.visible = false;
scene.add(ship);

const hullMat   = new THREE.MeshStandardMaterial({ color:0xa6cd15, flatShading:true, roughness:0.6 });   // verde Capim
const accentMat = new THREE.MeshStandardMaterial({ color:0x59399e, flatShading:true, roughness:0.8 });   // detalhes roxos
const tankMat   = new THREE.MeshStandardMaterial({ color:0xa6cd15, flatShading:true, roughness:0.9 });
const nozzleMat = new THREE.MeshStandardMaterial({ color:0x444a55, flatShading:true, metalness:0.6, roughness:0.4 });
const windowMat = new THREE.MeshStandardMaterial({ color:0x3399ff, emissive:0x113355, emissiveIntensity:0.6 });
const boosterTipMat = new THREE.MeshStandardMaterial({ color:0x59399e, flatShading:true, roughness:0.7 });
const flameMat  = new THREE.MeshBasicMaterial({ color:0xffaa33, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false });

// cilindro com o eixo ao longo de Z (rBack = raio traseiro, rFront = dianteiro)
function zCyl(rBack, rFront, len, mat, seg=10) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rBack, rFront, len, seg), mat);
  m.rotation.x = Math.PI/2;
  return m;
}
// cone com a ponta para a frente (-Z)
function noseCone(r, len, mat) {
  const m = new THREE.Mesh(new THREE.ConeGeometry(r, len, 10), mat);
  m.rotation.x = -Math.PI/2;
  return m;
}
// bocal de motor apontando para trás (+Z)
function nozzle(r, len, mat) {
  const m = new THREE.Mesh(new THREE.ConeGeometry(r, len, 8), mat);
  m.rotation.x = Math.PI/2;
  return m;
}

const shipParts = { boosters:[], stage1:null, stage2:null, flame:null };
let massMul = 1;          // <1 depois das separações: nave mais leve e ágil
const debris = [];        // estágios ejetados tombando pelo espaço

function buildShip() {
  while (ship.children.length) ship.remove(ship.children[0]);
  shipParts.boosters = [];

  // --- módulo de comando (nunca se separa) ---
  const nose = noseCone(0.2, 0.55, hullMat); nose.position.z = -0.95;
  const crew = zCyl(0.24, 0.2, 0.75, hullMat); crew.position.z = -0.3;
  const cockpit = new THREE.Mesh(new THREE.SphereGeometry(0.09, 8, 8), windowMat);
  cockpit.position.set(0, 0.17, -0.42);
  const coreNozzle = nozzle(0.14, 0.28, nozzleMat); coreNozzle.position.z = 0.18;
  ship.add(nose, crew, cockpit, coreNozzle);

  // --- 2º estágio ---
  const stage2 = new THREE.Group();
  const s2body = zCyl(0.26, 0.26, 0.6, hullMat);
  const s2ring = zCyl(0.27, 0.27, 0.08, accentMat); s2ring.position.z = -0.28;
  const s2nozzle = nozzle(0.18, 0.3, nozzleMat); s2nozzle.position.z = 0.42;
  stage2.add(s2body, s2ring, s2nozzle);
  stage2.position.z = 0.45;
  ship.add(stage2);
  shipParts.stage2 = stage2;

  // --- 1º estágio (tanque laranja + aletas + motor principal) ---
  const stage1 = new THREE.Group();
  const s1body = zCyl(0.3, 0.28, 0.8, tankMat);
  const s1ring = zCyl(0.31, 0.31, 0.08, accentMat); s1ring.position.z = -0.36;
  const s1nozzle = nozzle(0.22, 0.35, nozzleMat); s1nozzle.position.z = 0.52;
  stage1.add(s1body, s1ring, s1nozzle);
  // aletas na diagonal (para não colidir visualmente com os boosters)
  [Math.PI/4, 3*Math.PI/4, 5*Math.PI/4, 7*Math.PI/4].forEach(a => {
    const fin = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.04, 0.5), accentMat);
    fin.position.set(Math.cos(a)*0.42, Math.sin(a)*0.42, 0.25);
    fin.rotation.z = a;
    stage1.add(fin);
  });
  stage1.position.z = 1.2;
  ship.add(stage1);
  shipParts.stage1 = stage1;

  // --- boosters laterais ---
  [-1, 1].forEach(side => {
    const booster = new THREE.Group();
    const body = zCyl(0.11, 0.11, 0.9, hullMat);
    const tip = noseCone(0.11, 0.25, boosterTipMat); tip.position.z = -0.55;
    const bNozzle = nozzle(0.09, 0.16, nozzleMat); bNozzle.position.z = 0.52;
    booster.add(body, tip, bNozzle);
    booster.position.set(side*0.44, 0, 1.15);
    ship.add(booster);
    shipParts.boosters.push(booster);
  });

  // --- chama do motor (base presa ao bocal ativo, ponta para trás) ---
  const flameGeo = new THREE.ConeGeometry(0.17, 0.8, 8);
  flameGeo.translate(0, 0.4, 0); // base na origem: esticar não desloca o bocal
  const flame = new THREE.Mesh(flameGeo, flameMat);
  flame.rotation.x = Math.PI/2;
  ship.add(flame);
  shipParts.flame = flame;
  moveFlame();
}

// reposiciona a chama no bocal do estágio ativo mais traseiro
function moveFlame() {
  if (!shipParts.flame) return;
  if (shipParts.stage1)      shipParts.flame.position.z = 1.85;
  else if (shipParts.stage2) shipParts.flame.position.z = 1.0;
  else                       shipParts.flame.position.z = 0.34;
}

buildShip();

// ---------- separação de estágios ----------
const STAGE_SEPARATIONS = [
  { at:0.25, key:'boosters', label:'BOOSTERS SEPARADOS' },
  { at:0.55, key:'stage1',   label:'1º ESTÁGIO SEPARADO' },
  { at:0.80, key:'stage2',   label:'2º ESTÁGIO SEPARADO' },
];
let nextSeparation = 0;

// solta uma peça da nave preservando posição/orientação no mundo
function detachPart(obj, sideDir) {
  const pos = new THREE.Vector3(), quat = new THREE.Quaternion();
  obj.getWorldPosition(pos); obj.getWorldQuaternion(quat);
  ship.remove(obj);
  obj.position.copy(pos); obj.quaternion.copy(quat);
  scene.add(obj);
  debris.push({
    mesh: obj,
    // quase acompanha a nave no início (a separação fica visível na tela)
    // e vai perdendo velocidade até sumir para trás
    vel: new THREE.Vector3(
      sideDir !== 0 ? sideDir*THREE.MathUtils.randFloat(1.8, 2.6) : THREE.MathUtils.randFloat(-0.7, 0.7),
      THREE.MathUtils.randFloat(-0.7, -0.3),
      -scrollSpeed*0.9
    ),
    angVel: new THREE.Vector3(
      THREE.MathUtils.randFloat(-2, 2),
      THREE.MathUtils.randFloat(-2, 2),
      THREE.MathUtils.randFloat(-1.5, 1.5)
    ),
  });
}

function performSeparation(sep) {
  if (sep.key === 'boosters') {
    shipParts.boosters.forEach((b, i) => detachPart(b, i === 0 ? -1 : 1));
    shipParts.boosters = [];
  } else {
    if (shipParts[sep.key]) detachPart(shipParts[sep.key], 0);
    shipParts[sep.key] = null;
  }
  massMul *= 0.88;
  moveFlame();
  AudioSys.separation();
  showStageMsg(sep.label);
  score += 50;
}

// ---------- materiais / geometrias reutilizados ----------
// Geometrias são compartilhadas (nunca descartadas): alocar uma nova por

const rockMats = [0x5c3a63, 0x4a2f4f, 0x3a2340].map(c => new THREE.MeshStandardMaterial({ color:c, flatShading:true }));
const rockGeoPool = Array.from({length:8}, () => new THREE.IcosahedronGeometry(1, 0));
const meteorMat = new THREE.MeshStandardMaterial({ color:0x8b6f47, flatShading:true });
const meteorGeo = new THREE.IcosahedronGeometry(0.55, 0);
const droneBodyGeo = new THREE.SphereGeometry(0.42, 8, 6);
const droneMat = new THREE.MeshStandardMaterial({ color:0x667788, flatShading:true });
const droneSensorGeo = new THREE.SphereGeometry(0.14, 6, 6);
const droneSensorMat = new THREE.MeshStandardMaterial({ color:0xff3344, emissive:0x991122, emissiveIntensity:0.8 });
const fuelCellMat = new THREE.MeshStandardMaterial({ color:0x33cc88, emissive:0x114433, emissiveIntensity:0.5, flatShading:true });
const fuelCellGeo = new THREE.OctahedronGeometry(0.4, 0);
const bulletPlayerGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 6);
const bulletPlayerMat = new THREE.MeshBasicMaterial({ color:0xffff44 });

// ---------- estado do jogo ----------
let state = 'intro'; // intro | title | select | playing | gameover | win
let diff = DIFFICULTIES.medio;
let fuel = 100, lives = 3, score = 0, distanceTravelled = 0, moonDistance = diff.moonDistance;
let scrollSpeed = SHIP_BASE.baseScroll;
let vx = 0, shootCd = 0, gravityDir = 1;
let invulnerable = false, invulnerableUntil = 0;

let corridorCenter = 0;
let corridorHalf = diff.corridorHalf;
let nextSegmentZ = 0;
let meteorCd = 3, droneCd = 7, fuelCd = 8;
let radioTimer = 0, radioNextSound = Math.random()*2 + 2;

const segments = [];
const meteors = [];
const drones = [];
const fuelCells = [];
const playerBullets = [];
const droneBullets = [];

// ---------- corredor procedural (nuvem de asteroides) ----------
function buildBeltSegment(z) {
  corridorCenter += (Math.random()*2-1) * CORRIDOR.driftStep;
  corridorCenter = THREE.MathUtils.clamp(corridorCenter, -CORRIDOR.maxCenterOffset, CORRIDOR.maxCenterOffset);
  if (Math.random() < 0.08) {
    corridorHalf = THREE.MathUtils.clamp(corridorHalf + (Math.random()*2-1)*1.2, diff.minHalf, diff.maxHalf);
  }
  const leftEdge = corridorCenter - corridorHalf;
  const rightEdge = corridorCenter + corridorHalf;

  const rocks = [];
  [[leftEdge,-1], [rightEdge,1]].forEach(([edge,dir]) => {
    for (let i=0; i<CORRIDOR.rocksPerSide; i++) {
      const r = THREE.MathUtils.randFloat(CORRIDOR.rockMinR, CORRIDOR.rockMaxR);
      const depth = THREE.MathUtils.randFloat(-CORRIDOR.beltOverlap, CORRIDOR.beltWidth);
      const x = edge + dir*depth;
      const y = THREE.MathUtils.randFloat(-3.4, 3.4);
      const zz = z + THREE.MathUtils.randFloat(-CORRIDOR.segmentLength/2, CORRIDOR.segmentLength/2);
      const mesh = new THREE.Mesh(rockGeoPool[(Math.random()*rockGeoPool.length)|0], rockMats[(Math.random()*rockMats.length)|0]);
      mesh.scale.setScalar(r);
      mesh.position.set(x, y, zz);
      mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
      mesh.userData.r = r;
      scene.add(mesh);
      rocks.push(mesh);
    }
  });

  segments.push({ z, leftEdge, rightEdge, rocks });

  if (state === 'playing') trySpawnObstacles(z, leftEdge, rightEdge);
}

function removeBeltSegment(seg) {
  seg.rocks.forEach(r => scene.remove(r)); // geometria é do pool compartilhado: não descartar
}

function currentSegment(z) {
  let best = segments[0], bestD = Infinity;
  for (const s of segments) {
    const d = Math.abs(s.z - z);
    if (d < bestD) { bestD = d; best = s; }
  }
  return best;
}

// ---------- spawn de obstáculos (mesma cadência de linhas do jogo 2D) ----------
function trySpawnObstacles(z, leftEdge, rightEdge) {
  meteorCd--; droneCd--; fuelCd--;
  const gapSize = rightEdge - leftEdge;
  const pad = 0.6;

  if (meteorCd <= 0 && gapSize > diff.minHalf*2*1.05) {
    spawnMeteor(THREE.MathUtils.randFloat(leftEdge+pad, rightEdge-pad), z);
    meteorCd = Math.round(THREE.MathUtils.randFloat(3,7)/diff.spawnMul);
  }
  if (droneCd <= 0 && gapSize > diff.minHalf*2*1.5) {
    spawnDrone(THREE.MathUtils.randFloat(leftEdge+pad*1.5, rightEdge-pad*1.5), z);
    droneCd = Math.round(THREE.MathUtils.randFloat(6,10)/diff.spawnMul);
  }
  if (fuelCd <= 0) {
    spawnFuelCell((leftEdge+rightEdge)/2, z);
    fuelCd = Math.round(THREE.MathUtils.randFloat(16,26));
  }
}

function spawnMeteor(x, z) {
  const mesh = new THREE.Mesh(meteorGeo, meteorMat);
  mesh.position.set(x, 0, z);
  scene.add(mesh);
  meteors.push({ mesh, extraSpeed: THREE.MathUtils.randFloat(1.4,4), spin: THREE.MathUtils.randFloat(-2.5,2.5) });
}

function spawnDrone(x, z) {
  const group = new THREE.Group();
  group.add(new THREE.Mesh(droneBodyGeo, droneMat));
  const sensor = new THREE.Mesh(droneSensorGeo, droneSensorMat);
  sensor.position.set(0, 0.1, -0.4);
  group.add(sensor);
  group.position.set(x, 0, z);
  scene.add(group);
  drones.push({ mesh:group, baseX:x, phase:Math.random()*1000, closingSpeed:THREE.MathUtils.randFloat(0.8,1.6), fireCd:THREE.MathUtils.randFloat(900,2200) });
}

function spawnFuelCell(x, z) {
  const mesh = new THREE.Mesh(fuelCellGeo, fuelCellMat);
  mesh.position.set(x, 0, z);
  scene.add(mesh);
  fuelCells.push({ mesh, phase: Math.random()*1000 });
}

function fireDroneBullet(d) {
  const mesh = new THREE.Mesh(bulletDroneGeo, bulletDroneMat);
  mesh.rotation.x = Math.PI/2;
  mesh.position.copy(d.mesh.position);
  scene.add(mesh);
  droneBullets.push({ mesh });
}

function spawnPlayerBullet() {
  const mesh = new THREE.Mesh(bulletPlayerGeo, bulletPlayerMat);
  mesh.rotation.x = Math.PI/2;
  mesh.position.set(ship.position.x, ship.position.y, ship.position.z - 1.4); // à frente do bico do foguete
  scene.add(mesh);
  playerBullets.push({ mesh, spawnMs: performance.now() });
}

function clearAllEntities() {
  meteors.splice(0).forEach(m => scene.remove(m.mesh));
  drones.splice(0).forEach(d => scene.remove(d.mesh));
  fuelCells.splice(0).forEach(f => scene.remove(f.mesh));
  playerBullets.splice(0).forEach(b => scene.remove(b.mesh));
  droneBullets.splice(0).forEach(b => scene.remove(b.mesh));
  debris.splice(0).forEach(d => scene.remove(d.mesh));
  segments.splice(0).forEach(removeBeltSegment);
}

// nada de cinturão de asteroides atrás do menu — mesmo fundo limpo (só estrelas) do jogo 2D

// ---------- dano / vida ----------
const flashEl = document.getElementById('flash');
function flashHit() {
  flashEl.style.opacity = '0.5';
  setTimeout(() => flashEl.style.opacity = '0', 90);
}

function damagePlayer() {
  if (invulnerable || state !== 'playing') return;
  lives--;
  AudioSys.explosion();
  flashHit();
  updateHUD();
  if (lives <= 0) { triggerGameOver('Impacto fatal no cinturão de meteoros.'); return; }
  invulnerable = true;
  invulnerableUntil = performance.now() + 1300;
}

// ---------- colisões ----------
function handleCollisions() {
  const shipR = SHIP_BASE.radius;

  outer:
  for (let bi=playerBullets.length-1; bi>=0; bi--) {
    const b = playerBullets[bi];
    for (let mi=meteors.length-1; mi>=0; mi--) {
      const m = meteors[mi];
      if (dist2(b.mesh.position, m.mesh.position) < sq(0.25+0.55)) {
        scene.remove(b.mesh); playerBullets.splice(bi,1);
        scene.remove(m.mesh); meteors.splice(mi,1);
        score += 10; AudioSys.explosion();
        continue outer;
      }
    }
    for (let di=drones.length-1; di>=0; di--) {
      const d = drones[di];
      if (dist2(b.mesh.position, d.mesh.position) < sq(0.25+0.5)) {
        scene.remove(b.mesh); playerBullets.splice(bi,1);
        scene.remove(d.mesh); drones.splice(di,1);
        score += 25; AudioSys.explosion();
        continue outer;
      }
    }
  }

  for (let i=meteors.length-1;i>=0;i--) {
    const m = meteors[i];
    if (dist2(ship.position, m.mesh.position) < sq(shipR+0.55)) {
      scene.remove(m.mesh); meteors.splice(i,1);
      damagePlayer();
    }
  }
  for (let i=drones.length-1;i>=0;i--) {
    const d = drones[i];
    if (dist2(ship.position, d.mesh.position) < sq(shipR+0.5)) {
      scene.remove(d.mesh); drones.splice(i,1);
      damagePlayer();
    }
  }
  for (let i=droneBullets.length-1;i>=0;i--) {
    const b = droneBullets[i];
    if (dist2(ship.position, b.mesh.position) < sq(shipR+0.2)) {
      scene.remove(b.mesh); droneBullets.splice(i,1);
      damagePlayer();
    }
  }
  for (let i=fuelCells.length-1;i>=0;i--) {
    const f = fuelCells[i];
    if (dist2(ship.position, f.mesh.position) < sq(shipR+0.4)) {
      scene.remove(f.mesh); fuelCells.splice(i,1);
      fuel = Math.min(100, fuel+40); score += 15; AudioSys.pickup();
    }
  }

  if (!invulnerable) {
    for (const seg of segments) {
      if (Math.abs(seg.z - ship.position.z) > CORRIDOR.segmentLength*1.5) continue;
      for (const rock of seg.rocks) {
        if (dist2(ship.position, rock.position) < sq(shipR+rock.userData.r)) {
          const segCenter = (seg.leftEdge+seg.rightEdge)/2;
          vx = (ship.position.x < segCenter ? 1 : -1) * 4.5;
          damagePlayer();
          return;
        }
      }
    }
  }

  const seg = currentSegment(ship.position.z);
  const hardMin = seg.leftEdge - CORRIDOR.beltWidth - CORRIDOR.hardLimitMargin;
  const hardMax = seg.rightEdge + CORRIDOR.beltWidth + CORRIDOR.hardLimitMargin;
  ship.position.x = THREE.MathUtils.clamp(ship.position.x, hardMin, hardMax);
}

// ---------- HUD ----------
const fuelBarFill = document.getElementById('fuelBarFill');
const progressBarFill = document.getElementById('progressBarFill');
const scoreText = document.getElementById('scoreText');
const livesText = document.getElementById('livesText');
const introOverlay = document.getElementById('introOverlay');
const spaceScene = document.getElementById('spaceScene');
const crawlText = document.getElementById('crawlText');
const titleOverlay = document.getElementById('titleOverlay');
const selectOverlay = document.getElementById('selectOverlay');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const gameOverPanel = document.getElementById('gameOverPanel');
const winOverlay = document.getElementById('winOverlay');
const winPanel = document.getElementById('winPanel');
const stageMsgEl = document.getElementById('stageMsg');
const progressBarBg = document.getElementById('progressBarBg');

// marcadores dos pontos de separação na barra de progresso
STAGE_SEPARATIONS.forEach(s => {
  const tick = document.createElement('div');
  tick.className = 'stage-tick';
  tick.style.left = (s.at*100)+'%';
  progressBarBg.appendChild(tick);
});

let stageMsgTimer = null;
function showStageMsg(text) {
  stageMsgEl.textContent = text;
  stageMsgEl.style.opacity = '1';
  if (stageMsgTimer) clearTimeout(stageMsgTimer);
  stageMsgTimer = setTimeout(() => stageMsgEl.style.opacity = '0', 2000);
}

function updateHUD() {
  const pct = fuel/100;
  fuelBarFill.style.width = (pct*100)+'%';
  fuelBarFill.style.background = pct>0.5 ? '#33cc66' : (pct>0.2 ? '#ffcc33' : '#ff4444');
  const prog = THREE.MathUtils.clamp(distanceTravelled/(moonDistance||1500), 0, 1);
  progressBarFill.style.width = (prog*100)+'%';
  scoreText.textContent = 'Score: '+Math.floor(score);
  livesText.textContent = 'Vidas: ' + '♥'.repeat(Math.max(lives,0));
}

// ---------- narrativa (idêntica ao jogo 2D) ----------
crawlText.innerHTML =
  '<span class="crawl-title">CAPIM-X</span>\n\n\n'+
  '2049.\n\n\n'+
  'A Terra esgotou seu recurso mais precioso.\n'+
  'A última reserva conhecida está na Lua. Dezenas\n'+
  'de missões já tentaram chegar — nenhuma voltou.\n\n'+
  'Seus destroços viraram parte do cinturão de\n'+
  'meteoros, ao lado de drones de defesa automatizados\n'+
  'que ainda atacam qualquer nave que se aproxime.\n\n'+
  'A Capim-x carrega um canhão de mineração\n'+
  'adaptado: abre caminho pelos meteoros e neutraliza\n'+
  'os drones. Não é uma nave de guerra — cada disparo\n'+
  'consome combustível, o mesmo que decide se você\n'+
  'chega ou vira mais um destroço.\n\n'+
  'Sem freio: a nave desliza, a gravidade puxa,\n'+
  'e a Lua cresce no horizonte.\n\n'+
  '<span class="crawl-final">Desvie.<br>Atire.<br>Abasteça.<br>Chegue.</span>';

// ---------- campo de estrelas do overlay de introdução ----------
(function buildStarfield() {
  const bg = document.getElementById('spaceScene');
  if (!bg) return;
  const frag = document.createDocumentFragment();
  for (let i = 0; i < 160; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.6;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = (Math.random() * 100) + '%';
    s.style.top = (Math.random() * 100) + '%';
    s.style.setProperty('--dur', (2 + Math.random() * 4).toFixed(2) + 's');
    s.style.setProperty('--delay', (Math.random() * 4).toFixed(2) + 's');
    if (Math.random() < 0.15) s.style.background = '#bcd2ff';   // algumas estrelas azuladas
    frag.appendChild(s);
  }
  bg.appendChild(frag);
})();

// ---------- controle de estado ----------
function startGame(diffKey) {
  diff = DIFFICULTIES[diffKey] || DIFFICULTIES.medio;
  state = 'playing';
  fuel = 100; lives = 3; score = 0; distanceTravelled = 0;
  scrollSpeed = SHIP_BASE.baseScroll;
  corridorCenter = 0; corridorHalf = diff.corridorHalf;
  meteorCd = 3; droneCd = 7; fuelCd = 8;
  invulnerable = false; invulnerableUntil = 0;
  vx = 0; shootCd = 0;
  gravityDir = Math.random() < 0.5 ? 1 : -1;
  moonDistance = diff.moonDistance;
  radioTimer = 0; radioNextSound = Math.random()*2 + 2;

  clearAllEntities();
  nextSegmentZ = 0;
  for (let i=0;i<20;i++) { buildBeltSegment(nextSegmentZ); nextSegmentZ -= CORRIDOR.segmentLength; }

  buildShip();           // remonta o foguete completo (estágios + boosters)
  massMul = 1;
  nextSeparation = 0;
  ship.position.set(0,0,0);
  ship.visible = true;
  moon.visible = false; moon.scale.set(1,1,1);

  introOverlay.style.display = 'none';
  titleOverlay.style.display = 'none';
  selectOverlay.style.display = 'none';
  gameOverOverlay.style.display = 'none';
  winOverlay.style.display = 'none';
  spaceScene.style.display = 'none';   // no jogo, a cena 3D aparece no lugar
  updateHUD();
  AudioSys.startTrack(AudioSys.gameTrack);
}

function goToTitle() {
  if (state !== 'intro') return;
  state = 'title';
  introOverlay.style.display = 'none';
  titleOverlay.style.display = 'flex';
}

function goToSelect() {
  if (state !== 'title') return;
  state = 'select';
  titleOverlay.style.display = 'none';
  selectOverlay.style.display = 'flex';
}

function goBack() {
  if (state !== 'select') return;
  state = 'title';
  selectOverlay.style.display = 'none';
  titleOverlay.style.display = 'flex';
}

function triggerGameOver(reason) {
  state = 'gameover';
  ship.visible = false;
  RadioChatter.stop();
  AudioSys.gameOver();
  gameOverPanel.textContent =
    `A MISSÃO SE PERDEU\n${reason}\n\nDistância: ${Math.floor(distanceTravelled)}\nScore: ${Math.floor(score)}\n\n`+
    `Mais um destroço no caminho de quem vier depois.\n\n[1] Fácil  [2] Médio  [3] Difícil`;
  gameOverOverlay.style.display = 'flex';
}

function winGame() {
  state = 'win';
  ship.visible = false;
  RadioChatter.stop();
  AudioSys.win();
  moon.visible = true;
  winPanel.textContent =
    `A CAPIM-X CHEGOU NA LUA\n\nDificuldade: ${diff.label}\nScore: ${Math.floor(score)}\n\n[1] Fácil  [2] Médio  [3] Difícil`;
  winOverlay.style.display = 'flex';
}

// ---------- input ----------
const keys = {};
const CAPTURED_KEYS = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'];

function armAudio() {
  AudioSys.init();
  RadioChatter.init();
  if (AudioSys.ctx.state === 'suspended') AudioSys.ctx.resume();
  if ((state === 'title' || state === 'select') && !AudioSys.track && !AudioSys.introTimer) {
    AudioSys.startTrack(AudioSys.menuTrack);
  }
}

// primeiro gesto na intro: inicia a música E o texto rolando juntos
let introStarted = false;
function beginIntro() {
  if (introStarted) return;
  introStarted = true;
  const startEl = document.getElementById('introStart');
  const skipEl = document.getElementById('skipHint');
  if (startEl) startEl.style.display = 'none';
  if (skipEl)  skipEl.style.display = 'block';
  crawlText.style.animationPlayState = 'running';
  AudioSys.init();
  RadioChatter.init();
  if (AudioSys.ctx.state === 'suspended') AudioSys.ctx.resume();
  if (!AudioSys.introPlayed && !AudioSys.track) {
    AudioSys.introPlayed = true;
    AudioSys.playIntro();
  }
}

crawlText.addEventListener('animationend', () => { if (state === 'intro') goToTitle(); });

addEventListener('keydown', e => {
  if (CAPTURED_KEYS.includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  armAudio();
  if (e.code === 'KeyM') { AudioSys.toggleMute(); if (AudioSys.muted) RadioChatter.stop(); }

  if (state === 'intro') { if (!introStarted) beginIntro(); else goToTitle(); return; }
  if (state === 'title') { if (e.code==='Enter' || e.code==='Space') goToSelect(); return; }
  if (state === 'select' && e.code === 'Escape') { goBack(); return; }
  if (state==='select' || state==='gameover' || state==='win') {
    if (e.code==='Digit1') startGame('facil');
    else if (e.code==='Digit2') startGame('medio');
    else if (e.code==='Digit3') startGame('dificil');
    else if (e.code==='Space') startGame('medio');
  }
});
addEventListener('keyup', e => { keys[e.code] = false; });
addEventListener('pointerdown', e => {
  armAudio();
  if (state === 'intro') { if (!introStarted) beginIntro(); else goToTitle(); }
});

// ---------- botões do menu ----------
function uiBlip(freq) {
  if (!AudioSys.ctx || !AudioSys.sfxGain) return;
  AudioSys.blip(AudioSys.ctx.currentTime, freq, 0.09, 'triangle', AudioSys.sfxGain, 0.14, freq*1.5);
}
document.getElementById('btnNewGame').addEventListener('click', () => { armAudio(); uiBlip(720); goToSelect(); });
document.getElementById('btnBack').addEventListener('click', () => { armAudio(); uiBlip(420); goBack(); });
document.querySelectorAll('.diff-btn').forEach(b => {
  b.addEventListener('click', () => { armAudio(); uiBlip(900); startGame(b.dataset.diff); });
});

// ---------- câmera em terceira pessoa ----------
const camOffset = new THREE.Vector3(0, 7.5, 9.5);
const desiredCamPos = new THREE.Vector3();
const camTarget = new THREE.Vector3();

// ---------- loop principal ----------
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (state !== 'playing') {
    renderer.render(scene, camera);
    return;
  }

  const now = performance.now();
  const boosting = keys['ArrowUp'];
  const braking  = keys['ArrowDown'];

  radioTimer += dt;
  if (radioTimer > radioNextSound) {
    RadioChatter.playClip();
    radioTimer = 0;
    radioNextSound = Math.random()*5 + 5;
  }

  const difficultyT = THREE.MathUtils.clamp(distanceTravelled/moonDistance, 0, 1);

  // separação de estágios nos marcos de progresso
  while (nextSeparation < STAGE_SEPARATIONS.length && difficultyT >= STAGE_SEPARATIONS[nextSeparation].at) {
    performSeparation(STAGE_SEPARATIONS[nextSeparation]);
    nextSeparation++;
  }

  let target = THREE.MathUtils.lerp(SHIP_BASE.baseScroll, SHIP_BASE.maxScroll, difficultyT);
  target *= 1 + (1-massMul)*0.3;   // mais leve = cruzeiro mais rápido
  if (boosting) target *= SHIP_BASE.boostMul;
  if (braking) target *= SHIP_BASE.brakeMul;
  scrollSpeed = damp(scrollSpeed, target, SHIP_BASE.scrollLerp, dt);

  let drain = (4 + (boosting?3:0) - (braking?2:0)) * diff.fuelDrainMul;
  drain = Math.max(drain, 1) * (0.55 + 0.45*massMul);  // mais leve = menos consumo
  fuel -= drain*dt;

  const effMaxSpeed = diff.maxSpeed * (1 + (1-massMul)*0.5);
  if (keys['ArrowLeft'])  vx -= (diff.thrust/massMul)*dt;
  if (keys['ArrowRight']) vx += (diff.thrust/massMul)*dt;
  vx += gravityDir*diff.gravity*dt;
  if (vx > 0) vx = Math.max(0, vx - diff.drag*dt);
  else if (vx < 0) vx = Math.min(0, vx + diff.drag*dt);
  vx = THREE.MathUtils.clamp(vx, -effMaxSpeed, effMaxSpeed);

  ship.position.x += vx*dt;
  ship.position.z -= scrollSpeed*dt;
  ship.rotation.z = damp(ship.rotation.z, -vx*0.12, 8, dt);
  distanceTravelled = -ship.position.z;

  shootCd -= dt*1000;
  if (keys['Space'] && shootCd <= 0 && fuel > 0.5) {
    spawnPlayerBullet();
    shootCd = SHIP_BASE.shootCooldown;
    fuel -= SHIP_BASE.shotFuelCost;
    AudioSys.shoot();
  }

  if (fuel <= 0) { fuel = 0; updateHUD(); triggerGameOver('Sem combustível — à deriva no vácuo.'); return; }

  if (invulnerable) {
    ship.visible = Math.floor(now/120)%2===0;
    if (now > invulnerableUntil) invulnerable = false;
  } else {
    ship.visible = true;
  }

  // chama do motor: tremula e estica com o empuxo
  if (shipParts.flame) {
    const thrustLevel = boosting ? 1.5 : (braking ? 0.45 : 1);
    const flicker = 0.85 + Math.random()*0.3;
    shipParts.flame.scale.set(flicker, thrustLevel*flicker, flicker); // Y local = comprimento (aponta para trás)
    shipParts.flame.material.opacity = 0.55 + Math.random()*0.3;
  }

  // destroços dos estágios ejetados: tombam e ficam para trás
  for (let i=debris.length-1;i>=0;i--) {
    const d = debris[i];
    d.mesh.position.addScaledVector(d.vel, dt);
    d.vel.z += 1.6*dt; // motor apagado: perde velocidade e a nave o deixa para trás
    d.mesh.rotation.x += d.angVel.x*dt;
    d.mesh.rotation.y += d.angVel.y*dt;
    d.mesh.rotation.z += d.angVel.z*dt;
    if (d.mesh.position.z > ship.position.z + CORRIDOR.behindMargin) { scene.remove(d.mesh); debris.splice(i,1); }
  }

  while (ship.position.z - nextSegmentZ < CORRIDOR.aheadDistance) {
    buildBeltSegment(nextSegmentZ);
    nextSegmentZ -= CORRIDOR.segmentLength;
  }
  while (segments.length && segments[0].z > ship.position.z + CORRIDOR.behindMargin) {
    removeBeltSegment(segments.shift());
  }

  for (let i=meteors.length-1;i>=0;i--) {
    const m = meteors[i];
    m.mesh.position.z += m.extraSpeed*dt;
    m.mesh.rotation.x += m.spin*dt;
    m.mesh.rotation.y += m.spin*0.6*dt;
    if (m.mesh.position.z > ship.position.z + CORRIDOR.behindMargin) { scene.remove(m.mesh); meteors.splice(i,1); }
  }
  for (let i=drones.length-1;i>=0;i--) {
    const d = drones[i];
    d.mesh.position.x = d.baseX + Math.sin((now+d.phase)/300)*1.2;
    d.mesh.position.z += d.closingSpeed*dt;
    d.fireCd -= dt*1000;
    if (d.fireCd <= 0) { fireDroneBullet(d); d.fireCd = THREE.MathUtils.randFloat(1500,3000); }
    if (d.mesh.position.z > ship.position.z + CORRIDOR.behindMargin) { scene.remove(d.mesh); drones.splice(i,1); }
  }
  for (const f of fuelCells) { f.mesh.position.y = Math.sin((now+f.phase)/400)*0.2; }
  for (let i=fuelCells.length-1;i>=0;i--) {
    const f = fuelCells[i];
    if (f.mesh.position.z > ship.position.z + CORRIDOR.behindMargin) { scene.remove(f.mesh); fuelCells.splice(i,1); }
  }
  for (let i=playerBullets.length-1;i>=0;i--) {
    const b = playerBullets[i];
    b.mesh.position.z -= SHIP_BASE.bulletSpeed*dt;
    if (now - b.spawnMs > 2500) { scene.remove(b.mesh); playerBullets.splice(i,1); }
  }
  for (let i=droneBullets.length-1;i>=0;i--) {
    const b = droneBullets[i];
    b.mesh.position.z += 11*dt;
    if (b.mesh.position.z > ship.position.z + CORRIDOR.behindMargin) { scene.remove(b.mesh); droneBullets.splice(i,1); }
  }

  handleCollisions();

  if (difficultyT > 0.75) {
    const p = THREE.MathUtils.clamp((difficultyT-0.75)/0.25, 0, 1);
    moon.visible = true;
    moon.scale.setScalar(1 + p*3);
    moon.position.set(20, 30, ship.position.z - 300 + p*250);
  }

  if (distanceTravelled >= moonDistance) { winGame(); return; }

  updateHUD();

  desiredCamPos.set(ship.position.x*0.6 + camOffset.x, ship.position.y + camOffset.y, ship.position.z + camOffset.z);
  camera.position.lerp(desiredCamPos, 1 - Math.exp(-8*dt));
  camTarget.set(ship.position.x, ship.position.y - 1.4, ship.position.z - 6);
  camera.lookAt(camTarget);

  renderer.render(scene, camera);
}
animate();
</script>
